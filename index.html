<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智慧雲端生活筆記</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LifeSync">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --primary-color: #4f46e5;
            --fast-color: #10b981;
            --bg-color: #f3f6f9;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --success-bg: #f0fdf4;
            --success-border: #4ade80;
            --danger-color: #ef4444;
            --dark-green: #2e7d32;
            --btn-food: #f57c00;
            --btn-expense: #e91e63;
            --btn-work: #6d4c41;
            --btn-transit: #2196f3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-main); line-height: 1.5;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 20px) env(safe-area-inset-left);
        }

        .container { max-width: 600px; margin: 0 auto; padding: 16px; }

        h2.main-title { text-align: center; margin-top: 10px; font-size: 22px; color: #333; }
        .date-display { text-align: center; color: #ff5722; font-weight: bold; margin-bottom: 20px; font-size: 14px; }

        .green-dashboard {
            background: var(--dark-green); color: white; border-radius: 12px; padding: 20px 10px; 
            display: flex; justify-content: space-between; text-align: center; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .dash-item { flex: 1; }
        .dash-label { font-size: 11px; opacity: 0.9; margin-bottom: 4px; }
        .dash-value { font-size: 19px; font-weight: bold; }
        .dash-divider { width: 1px; background: rgba(255,255,255,0.3); margin: 0 5px; }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .cat-btn {
            color: white; border: none; padding: 16px; border-radius: 12px; 
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .cat-btn:active { transform: scale(0.95); }
        .cat-food { background: var(--btn-food); }
        .cat-expense { background: var(--btn-expense); }
        .cat-work { background: var(--btn-work); }
        .cat-transit { background: var(--btn-transit); }

        .input-section {
            background: var(--card-bg); border: 2px solid #3b82f6; border-radius: 16px; 
            padding: 20px; margin-bottom: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%; height: 50px; padding: 12px; margin-bottom: 8px;
            border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; resize: none; outline: none;
        }

        #ai-toggle-container { display: none; margin-bottom: 12px; }
        .ai-toggle-label { 
            display: inline-flex; align-items: center; gap: 8px; font-size: 14px; 
            color: var(--text-main); font-weight: 600; cursor: pointer; 
            background: #fff9c4; padding: 8px 12px; border-radius: 8px; border: 1px solid #fff176;
        }
        .ai-toggle-label input { width: 18px; height: 18px; accent-color: var(--primary-color); }

        .main-btn {
            width: 100%; border: none; border-radius: 12px; padding: 12px 0; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s; color: white; background: var(--primary-color); margin-bottom: 16px;
        }

        .record-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #e5e7eb; gap: 14px; position: relative; background: white; }
        .has-calories { background-color: var(--success-bg); border-left: 4px solid var(--success-border); }
        .record-info { flex: 1; }
        .record-text { font-size: 16px; font-weight: bold; }
        .record-meta { font-size: 13px; color: var(--text-muted); }
        .loading-spinner { display: none; text-align: center; padding: 12px; color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="main-title">☁️ 智慧雲端生活筆記</h2>
    <div class="date-display" id="current-date">📅 載入中...</div>

    <div class="green-dashboard">
        <div class="dash-item">
            <div class="dash-label">💵 洗費</div>
            <div class="dash-value">$ <span id="total-expenses">0</span></div>
        </div>
        <div class="dash-divider"></div>
        <div class="dash-item">
            <div class="dash-label">🍔 食野</div>
            <div class="dash-value">$ <span id="food-expenses">0</span></div>
        </div>
        <div class="dash-divider"></div>
        <div class="dash-item">
            <div class="dash-label">🔥 熱量</div>
            <div class="dash-value"><span id="total-calories">0</span> <span style="font-size:10px">kcal</span></div>
        </div>
    </div>

    <div class="cat-grid">
        <button class="cat-btn cat-food" onclick="setPrefix('🍔 食野', true)">🍔 食野</button>
        <button class="cat-btn cat-expense" onclick="setPrefix('💵 洗費', false)">💵 洗費</button>
        <button class="cat-btn cat-work" onclick="setPrefix('🏃‍♂️ 運動', true)">🏃‍♂️ 運動</button>
        <button class="cat-btn cat-transit" onclick="setPrefix('🚗 交通', false)">🚗 交通</button>
    </div>

    <div class="input-section">
        <textarea id="note-input" placeholder="例如：叉燒飯 55"></textarea>
        <div id="ai-toggle-container">
            <label class="ai-toggle-label">
                <input type="checkbox" id="ai-checkbox"> ✨ AI 分析
            </label>
        </div>
        <button class="main-btn" onclick="handleSubmit()">➕ 記錄加入清單</button>
        <div id="loading-text" class="loading-spinner">⚡ AI 正在分析...</div>
    </div>

    <div id="records-list" class="list-section"></div>
</div>

<script>
    // 你的正確網址
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzPTI3Z7N11eyOFUGBQ8Zscbf0S7uFqofUjVb1zhDuW-GIE-DYNQ__hx96pSHNevKtO/exec"; 

    document.getElementById('current-date').textContent = new Date().toLocaleDateString('zh-HK', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

    function setPrefix(catText, showAI) {
        document.getElementById('note-input').value = `[${catText}] `;
        document.getElementById('ai-toggle-container').style.display = showAI ? 'block' : 'none';
        document.getElementById('ai-checkbox').checked = showAI;
    }

    async function handleSubmit() {
        const inputEl = document.getElementById('note-input');
        const useAI = document.getElementById('ai-checkbox').checked;
        const text = inputEl.value.trim();
        const load = document.getElementById('loading-text');

        if (!text) return;
        if(useAI) {
            load.style.display = 'block';
            try {
                const res = await fetch(WEB_APP_URL, {method: 'POST', body: JSON.stringify({action: 'analyze', text: text})});
                const data = await res.json();
                if(data.success) addToList(data.data); else alert("AI 分析失敗: " + data.message);
            } catch(e) { alert("連線失敗"); }
            load.style.display = 'none';
        } else {
            addToList({text: text, amount: '', category: '一般', calories: ''});
        }
        inputEl.value = '';
    }

    function addToList(data) {
        const div = document.createElement('div');
        div.className = `record-item ${data.calories ? 'has-calories' : ''}`;
        div.innerHTML = `
            <input type="checkbox" onchange="sync(this, '${JSON.stringify(data).replace(/'/g, "\\'")}')">
            <div class="record-info">
                <div class="record-text">${data.text}</div>
                <div class="record-meta">${data.amount ? '$'+data.amount : ''} ${data.calories ? data.calories+'kcal' : ''}</div>
            </div>
            <button onclick="this.parentElement.remove()" style="border:none;background:none;color:#ccc">🗑️</button>
        `;
        document.getElementById('records-list').appendChild(div);
    }

    async function sync(checkbox, dataStr) {
        if(checkbox.checked) {
            const data = JSON.parse(dataStr);
            const res = await fetch(WEB_APP_URL, {method: 'POST', body: JSON.stringify({action: 'save', record: data})});
            if((await res.json()).success) {
                checkbox.disabled = true;
                updateDash(data);
            }
        }
    }

    function updateDash(d) {
        if(d.amount) {
            document.getElementById('total-expenses').textContent = parseInt(document.getElementById('total-expenses').textContent || 0) + parseInt(d.amount || 0);
            if(d.category.includes('食')) document.getElementById('food-expenses').textContent = parseInt(document.getElementById('food-expenses').textContent || 0) + parseInt(d.amount || 0);
        }
        if(d.calories) document.getElementById('total-calories').textContent = parseInt(document.getElementById('total-calories').textContent || 0) + parseInt(d.calories || 0);
    }
</script>
</body>
</html>
