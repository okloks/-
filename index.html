<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>жҷәж…§йӣІз«Ҝз”ҹжҙ»зӯҶиЁҳ</title>
    <style>
        :root { --dark-green: #2e7d32; --btn-food: #f57c00; --btn-expense: #e91e63; --btn-work: #6d4c41; --btn-transit: #2196f3; --primary: #4f46e5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f3f6f9; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        
        h2 { text-align: center; font-size: 22px; color: #333; margin-bottom: 15px; }
        .date-text { text-align: center; color: #ff5722; font-weight: bold; margin-bottom: 15px; font-size: 14px; }

        .green-dashboard { background: var(--dark-green); color: white; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dash-item { text-align: center; flex: 1; }
        .dash-label { font-size: 10px; opacity: 0.8; }
        .dash-value { font-size: 18px; font-weight: bold; margin-top: 5px; }

        .cat-box { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-btn { color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }

        .input-section { background: white; border: 2px solid #3b82f6; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 50px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        #ai-toggle-container { display: none; margin-bottom: 10px; background: #fff9c4; padding: 8px; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /* еҝ«жҚ·жЁҷзұӨ */
        .quick-chips { display: flex; gap: 8px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
        .chip { background: #f3f4f6; border: 1px solid #d1d5db; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; }

        .record-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; gap: 12px; border-left: 4px solid #ddd; }
        .has-calories { border-left-color: #10b981; background: #f0fdf4; }
        .record-info { flex: 1; }
        .record-text { font-weight: bold; }
        .record-meta { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h2>вҳҒпёҸ жҷәж…§йӣІз«Ҝз”ҹжҙ»зӯҶиЁҳ</h2>
        <div class="date-text" id="date-display"></div>

        <div class="green-dashboard">
            <div class="dash-item"><div class="dash-label">жҙ—иІ»</div><div class="dash-value">$ <span id="total-expenses">0</span></div></div>
            <div class="dash-item"><div class="dash-label">йЈҹйҮҺ</div><div class="dash-value">$ <span id="food-expenses">0</span></div></div>
            <div class="dash-item"><div class="dash-label">зҶұйҮҸ</div><div class="dash-value"><span id="total-calories">0</span> <small>kcal</small></div></div>
        </div>

        <div class="cat-box">
            <div class="cat-grid">
                <button class="cat-btn" style="background:var(--btn-food)" onclick="setPrefix('рҹҚ” йЈҹйҮҺ', true)">рҹҚ” йЈҹйҮҺ</button>
                <button class="cat-btn" style="background:var(--btn-expense)" onclick="setPrefix('рҹ’ө жҙ—иІ»', false)">рҹ’ө жҙ—иІ»</button>
                <button class="cat-btn" style="background:var(--btn-work)" onclick="setPrefix('рҹҸғвҖҚвҷӮпёҸ йҒӢеӢ•', true)">рҹҸғвҖҚвҷӮпёҸ йҒӢеӢ•/е·ҘдҪң</button>
                <button class="cat-btn" style="background:var(--btn-transit)" onclick="setPrefix('рҹҡ— дәӨйҖҡ', false)">рҹҡ— дәӨйҖҡ</button>
            </div>
        </div>

        <div class="input-section">
            <textarea id="note-input" placeholder="ијёе…Ҙе…§е®№жҲ–й»һйҒёеҝ«жҚ·жЁҷзұӨ..."></textarea>
            <div id="ai-toggle-container">
                <label><input type="checkbox" id="ai-checkbox"> вңЁ AI еҲҶжһҗ</label>
            </div>
            <button class="submit-btn" onclick="handleSubmit()">вһ• иЁҳйҢ„еҠ е…Ҙжё…е–®</button>
            
            <div class="quick-chips">
                <button class="chip" onclick="addQuickRecord('вҳ• е’–е•Ў', '45', 'йЈІйЈҹ', '')">+ е’–е•Ў</button>
                <button class="chip" onclick="addQuickRecord('рҹҚұ дҫҝз•¶', '60', 'йЈІйЈҹ', '')">+ дҫҝз•¶</button>
                <button class="chip" onclick="addQuickRecord('рҹҸғвҖҚвҷӮпёҸ HIIT', '', 'йҒӢеӢ•', '300')">+ HIIT</button>
                <button class="chip" onclick="addQuickRecord('рҹ§—вҖҚвҷӮпёҸ ж”ҖеІ©', '', 'йҒӢеӢ•', '400')">+ ж”ҖеІ©</button>
            </div>
        </div>

        <div id="records-list"></div>
    </div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzPTI3Z7N11eyOFUGBQ8Zscbf0S7uFqofUjVb1zhDuW-GIE-DYNQ__hx96pSHNevKtO/exec"; 

    document.getElementById('date-display').textContent = new Date().toLocaleDateString('zh-HK', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

    function setPrefix(catText, showAI) {
        document.getElementById('note-input').value = `[${catText}] `;
        document.getElementById('ai-toggle-container').style.display = showAI ? 'block' : 'none';
        document.getElementById('ai-checkbox').checked = showAI;
    }

    function addQuickRecord(text, amount, category, calories) {
        addToList({text: text, amount: amount, category: category, calories: calories});
    }

    async function handleSubmit() {
        const input = document.getElementById('note-input');
        const text = input.value;
        const useAI = document.getElementById('ai-checkbox').checked;

        if(useAI) {
            try {
                const res = await fetch(WEB_APP_URL, {method: 'POST', body: JSON.stringify({action: 'analyze', text: text})});
                const data = await res.json();
                if(data.success) addToList(data.data); else alert("AI еҲҶжһҗеӨұж•—");
            } catch(e) { alert("йҖЈз·ҡеӨұж•—"); }
        } else {
            addToList({text: text, amount: '', category: 'дёҖиҲ¬', calories: ''});
        }
        input.value = '';
    }

    function addToList(data) {
        const div = document.createElement('div');
        div.className = `record-item ${data.calories ? 'has-calories' : ''}`;
        div.innerHTML = `
            <input type="checkbox" onchange="sync(this, '${JSON.stringify(data).replace(/'/g, "\\'")}')">
            <div class="record-info">
                <div class="record-text">${data.text}</div>
                <div class="record-meta">${data.amount ? '$'+data.amount : ''} ${data.calories ? data.calories+'kcal' : ''}</div>
            </div>
            <button onclick="this.parentElement.remove()" style="border:none;background:none;color:#ccc">рҹ—‘пёҸ</button>
        `;
        document.getElementById('records-list').appendChild(div);
    }

    async function sync(checkbox, dataStr) {
        if(checkbox.checked) {
            const data = JSON.parse(dataStr);
            const res = await fetch(WEB_APP_URL, {method: 'POST', body: JSON.stringify({action: 'save', record: data})});
            if((await res.json()).success) {
                checkbox.disabled = true;
                updateDash(data);
            }
        }
    }

    function updateDash(d) {
        if(d.amount) {
            document.getElementById('total-expenses').textContent = parseInt(document.getElementById('total-expenses').textContent || 0) + parseInt(d.amount || 0);
            if(d.category.includes('йЈҹ')) document.getElementById('food-expenses').textContent = parseInt(document.getElementById('food-expenses').textContent || 0) + parseInt(d.amount || 0);
        }
        if(d.calories) document.getElementById('total-calories').textContent = parseInt(document.getElementById('total-calories').textContent || 0) + parseInt(d.calories || 0);
    }
</script>
</body>
</html>
